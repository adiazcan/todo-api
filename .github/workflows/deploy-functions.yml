name: Deploy Azure Function

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-functions.yml
      - TodoApi.sln
      - src/TodoApi.Functions/**
      - tests/**
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x
  FUNCTION_PROJECT_PATH: src/TodoApi.Functions/TodoApi.Functions.csproj
  PUBLISH_OUTPUT_PATH: published-function-app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore TodoApi.sln

      - name: Build solution
        run: dotnet build TodoApi.sln --configuration Release --no-restore

      - name: Run automated tests
        run: dotnet test TodoApi.sln --configuration Release --no-build --verbosity normal

      - name: Publish Azure Functions app
        run: dotnet publish ${{ env.FUNCTION_PROJECT_PATH }} --configuration Release --output ${{ github.workspace }}/${{ env.PUBLISH_OUTPUT_PATH }} --no-build

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: function-app-package
          path: ${{ github.workspace }}/${{ env.PUBLISH_OUTPUT_PATH }}
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    concurrency:
      group: azure-function-production
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: function-app-package
          path: ${{ github.workspace }}/${{ env.PUBLISH_OUTPUT_PATH }}

      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ github.workspace }}/${{ env.PUBLISH_OUTPUT_PATH }}
